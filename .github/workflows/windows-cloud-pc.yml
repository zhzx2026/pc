name: Windows Cloud PC (RDP + Encrypted Backup)

on:
  workflow_dispatch:
    inputs:
      total_minutes:
        description: "Total runtime in minutes (fixed upper bound: 300)"
        required: false
        default: "300"
      backup_window_minutes:
        description: "Final backup window in minutes"
        required: false
        default: "60"
  schedule:
    - cron: "0 */5 * * *"

concurrency:
  group: windows-cloud-pc
  cancel-in-progress: false

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 330

    steps:
      - name: Validate secrets
        shell: pwsh
        run: |
          if (-not $env:NGROK_AUTHTOKEN) {
            throw "Missing secret: NGROK_AUTHTOKEN"
          }
          if (-not $env:RDP_PASSWORD) {
            throw "Missing secret: RDP_PASSWORD"
          }
          if (-not $env:ZIP_PASSWORD) {
            throw "Missing secret: ZIP_PASSWORD"
          }
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}

      - name: Prepare RDP password
        shell: pwsh
        env:
          RDP_PASSWORD: ${{ secrets.RDP_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          $base = [string]$env:RDP_PASSWORD
          $effective = $base
          $mode = 'direct'
          $isCompliant = (
            $base.Length -ge 8 -and
            $base -cmatch '[A-Z]' -and
            $base -cmatch '[a-z]' -and
            $base -match '\d' -and
            $base -match '[^A-Za-z0-9]'
          )

          if (-not $isCompliant) {
            $effective = "$base-Aa1!"
            $mode = 'derived-with-suffix'
          }

          if ($effective.Length -gt 120) {
            throw 'RDP password is too long after normalization. Keep RDP_PASSWORD at 115 characters or fewer.'
          }

          Write-Host "::add-mask::$effective"
          "RDP_EFFECTIVE_PASSWORD=$effective" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RDP_PASSWORD_MODE=$mode" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "RDP password mode: $mode"
          if ($mode -eq 'derived-with-suffix') {
            Write-Host 'MSTSC password = your RDP_PASSWORD secret plus the fixed suffix: -Aa1!'
          } else {
            Write-Host 'MSTSC password = your RDP_PASSWORD secret.'
          }

      - name: Prepare persistent folders
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            'C:\Users\runneradmin\Desktop',
            'C:\Users\runneradmin\Documents',
            'C:\Users\runneradmin\Downloads',
            'C:\Users\runneradmin\Pictures',
            'C:\Users\runneradmin\Videos',
            'D:\CloudPC'
          )

          foreach ($path in $paths) {
            New-Item -Path $path -ItemType Directory -Force | Out-Null
          }

          Write-Host 'Persistent folders are ready.'

      - name: Find latest backup artifact
        id: find-backup
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const backups = artifacts
              .filter((artifact) => !artifact.expired && artifact.name.startsWith('cloudpc-backup-'))
              .sort((a, b) => Date.parse(b.created_at) - Date.parse(a.created_at));

            if (backups.length === 0) {
              core.info('No previous backup artifact found. Starting with a clean machine.');
              core.setOutput('found', 'false');
              return;
            }

            const latest = backups[0];
            core.info(`Selected backup artifact ${latest.name} (${latest.id}) created ${latest.created_at}.`);
            core.setOutput('found', 'true');
            core.setOutput('artifact_id', String(latest.id));
            core.setOutput('artifact_name', latest.name);

      - name: Download latest backup artifact
        if: steps.find-backup.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          artifact-ids: ${{ steps.find-backup.outputs.artifact_id }}
          path: ${{ runner.temp }}/restore

      - name: Restore latest backup
        if: steps.find-backup.outputs.found == 'true'
        shell: pwsh
        env:
          BACKUP_ARTIFACT_NAME: ${{ steps.find-backup.outputs.artifact_name }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $restoreRoot = Join-Path $env:RUNNER_TEMP 'restore'
          $firstVolume = Get-ChildItem -Path $restoreRoot -Recurse -Filter '*.zip.001' | Sort-Object FullName | Select-Object -First 1
          if (-not $firstVolume) {
            $firstVolume = Get-ChildItem -Path $restoreRoot -Recurse -Filter '*.zip' | Sort-Object FullName | Select-Object -First 1
          }

          if (-not $firstVolume) {
            throw 'Backup artifact was downloaded, but no archive was found.'
          }

          $sevenZip = @(
            "$env:ProgramFiles\7-Zip\7z.exe",
            'C:\Program Files\7-Zip\7z.exe'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $sevenZip) {
            throw '7z.exe not found on runner.'
          }

          & $sevenZip x $firstVolume.FullName "-p$env:ZIP_PASSWORD" '-aoa' '-y' '-spf'
          if ($LASTEXITCODE -ne 0) {
            throw "7z restore failed with code $LASTEXITCODE"
          }

          Write-Host "Restore completed from artifact $env:BACKUP_ARTIFACT_NAME"

      - name: Enable RDP and set password
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
          Enable-NetFirewallRule -DisplayGroup 'Remote Desktop'
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

          net user runneradmin "$env:RDP_EFFECTIVE_PASSWORD"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to set runneradmin password. net user exit code: $LASTEXITCODE"
          }

          Write-Host 'RDP enabled for user: runneradmin'

      - name: Download and start ngrok
        shell: pwsh
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          Invoke-WebRequest -Uri 'https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip' -OutFile "$env:RUNNER_TEMP\ngrok.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ngrok.zip" -DestinationPath "$env:RUNNER_TEMP\ngrok" -Force

          $ngrok = "$env:RUNNER_TEMP\ngrok\ngrok.exe"
          & $ngrok config add-authtoken "$env:NGROK_AUTHTOKEN"

          $stdoutLog = Join-Path $env:RUNNER_TEMP 'ngrok.stdout.log'
          $stderrLog = Join-Path $env:RUNNER_TEMP 'ngrok.stderr.log'
          $proc = Start-Process `
            -FilePath $ngrok `
            -ArgumentList @('tcp', '3389', '--log', 'stdout', '--log-format', 'logfmt') `
            -RedirectStandardOutput $stdoutLog `
            -RedirectStandardError $stderrLog `
            -WindowStyle Hidden `
            -PassThru

          $tunnel = $null
          $host = $null
          $port = $null
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 2
            try {
              $resp = Invoke-RestMethod -Uri 'http://127.0.0.1:4040/api/tunnels'
              $tunnel = $resp.tunnels | Where-Object { $_.proto -eq 'tcp' } | Select-Object -First 1
              if ($tunnel) { break }
            } catch {
            }

            if (-not $host -or -not $port) {
              $match = Select-String -Path $stdoutLog -Pattern 'url=tcp://(?<host>[^: ]+):(?<port>\d+)' -ErrorAction SilentlyContinue
              if ($match) {
                $last = $match | Select-Object -Last 1
                $host = $last.Matches[0].Groups['host'].Value
                $port = $last.Matches[0].Groups['port'].Value
                break
              }
            }

            if ($proc.HasExited) {
              break
            }
          }

          if (-not $tunnel -and (Test-Path $stdoutLog)) {
            $match = Select-String -Path $stdoutLog -Pattern 'url=tcp://(?<host>[^: ]+):(?<port>\d+)'
            if ($match) {
              $last = $match | Select-Object -Last 1
              $host = $last.Matches[0].Groups['host'].Value
              $port = $last.Matches[0].Groups['port'].Value
            }
          }

          if ((-not $tunnel) -and (-not $host -or -not $port)) {
            Write-Host 'ngrok stdout tail:'
            if (Test-Path $stdoutLog) {
              Get-Content -Path $stdoutLog -Tail 60 | ForEach-Object { Write-Host $_ }
            }

            Write-Host 'ngrok stderr tail:'
            if (Test-Path $stderrLog) {
              Get-Content -Path $stderrLog -Tail 60 | ForEach-Object { Write-Host $_ }
            }

            if ($proc.HasExited) {
              throw "ngrok exited before a tunnel became available. Exit code: $($proc.ExitCode)"
            }

            throw 'Failed to get ngrok tunnel info from local API.'
          }

          if (-not $host -or -not $port) {
            $publicUrl = $tunnel.public_url
            $address = $publicUrl -replace '^tcp://', ''
            $host, $port = $address -split ':'
          }

          if (-not $host -or -not $port) {
            throw 'Unable to determine ngrok host and port.'
          }

          "RDP_HOST=$host" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RDP_PORT=$port" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host '==============================================='
          Write-Host 'MSTSC connection info'
          Write-Host "Host: $host"
          Write-Host "Port: $port"
          Write-Host 'User: runneradmin'
          if ($env:RDP_PASSWORD_MODE -eq 'derived-with-suffix') {
            Write-Host 'Pass: use your RDP_PASSWORD secret plus the fixed suffix -Aa1!'
          } else {
            Write-Host 'Pass: use your RDP_PASSWORD secret'
          }
          Write-Host 'Persistent data folder: D:\CloudPC'
          Write-Host "Example: mstsc /v:$host`:$port"
          Write-Host '==============================================='

      - name: Keep RDP online before backup window
        shell: pwsh
        env:
          TOTAL_MINUTES: ${{ github.event.inputs.total_minutes || '300' }}
          BACKUP_WINDOW_MINUTES: ${{ github.event.inputs.backup_window_minutes || '60' }}
        run: |
          $ErrorActionPreference = 'Stop'

          $total = 300
          if ($env:TOTAL_MINUTES -and $env:TOTAL_MINUTES -match '^\d+$') {
            $total = [Math]::Min([int]$env:TOTAL_MINUTES, 300)
          }

          $backupWindow = 60
          if ($env:BACKUP_WINDOW_MINUTES -and $env:BACKUP_WINDOW_MINUTES -match '^\d+$') {
            $backupWindow = [Math]::Min([int]$env:BACKUP_WINDOW_MINUTES, 60)
          }

          $interactive = [Math]::Max($total - $backupWindow, 0)
          Write-Host "Interactive window: $interactive minute(s)."
          for ($i = 1; $i -le $interactive; $i++) {
            Start-Sleep -Seconds 60
            if ($i % 10 -eq 0) {
              Write-Host "Interactive alive: $i / $interactive minute(s)"
            }
          }

      - name: Last hour backup (zip encrypted + split volume)
        shell: pwsh
        env:
          BACKUP_WINDOW_MINUTES: ${{ github.event.inputs.backup_window_minutes || '60' }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $backupWindow = 60
          if ($env:BACKUP_WINDOW_MINUTES -and $env:BACKUP_WINDOW_MINUTES -match '^\d+$') {
            $backupWindow = [Math]::Min([int]$env:BACKUP_WINDOW_MINUTES, 60)
          }

          $windowStart = Get-Date
          $backupRoot = Join-Path $env:RUNNER_TEMP 'cloudpc-backup'
          New-Item -Path $backupRoot -ItemType Directory -Force | Out-Null

          $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $archiveBase = Join-Path $backupRoot "cloudpc-$timestamp.zip"
          $listFile = Join-Path $backupRoot 'include.txt'

          $sources = @(
            'C:\Users\runneradmin\Desktop',
            'C:\Users\runneradmin\Documents',
            'C:\Users\runneradmin\Downloads',
            'C:\Users\runneradmin\Pictures',
            'C:\Users\runneradmin\Videos',
            'D:\CloudPC'
          )
          $existing = $sources | Where-Object { Test-Path $_ }
          if (-not $existing -or $existing.Count -eq 0) {
            throw 'No backup source path exists.'
          }
          $existing | Set-Content -Path $listFile -Encoding ascii

          $sevenZip = @(
            "$env:ProgramFiles\7-Zip\7z.exe",
            'C:\Program Files\7-Zip\7z.exe'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $sevenZip) {
            throw '7z.exe not found on runner.'
          }

          Write-Host 'Creating encrypted split zip from:'
          $existing | ForEach-Object { Write-Host " - $_" }

          $args = @(
            'a',
            '-tzip',
            $archiveBase,
            "@$listFile",
            "-p$env:ZIP_PASSWORD",
            '-mem=AES256',
            '-spf',
            '-ssw',
            '-v1900m',
            '-mx=3'
          )
          & $sevenZip @args
          if ($LASTEXITCODE -ne 0) {
            throw "7z failed with code $LASTEXITCODE"
          }

          $parts = Get-ChildItem -Path "$archiveBase*" | Sort-Object Name
          if (-not $parts -or $parts.Count -eq 0) {
            throw 'No zip output generated.'
          }

          Write-Host 'Backup parts generated:'
          $parts | ForEach-Object {
            $mb = [Math]::Round($_.Length / 1MB, 2)
            Write-Host " - $($_.Name) ($mb MB)"
          }

          $elapsed = (Get-Date) - $windowStart
          $remaining = [Math]::Max([int]([Math]::Ceiling($backupWindow - $elapsed.TotalMinutes)), 0)
          Write-Host "Backup finished. Remaining in backup window: $remaining minute(s)."

          for ($i = 1; $i -le $remaining; $i++) {
            Start-Sleep -Seconds 60
            if ($i % 10 -eq 0) {
              Write-Host "Backup window alive: $i / $remaining minute(s)"
            }
          }

      - name: Upload encrypted split backup
        uses: actions/upload-artifact@v4
        with:
          name: cloudpc-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/cloudpc-backup/*.zip*
          retention-days: 30
